<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <style>
        /* Reset defaults */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 50px; /* spacing from top */
            background-color: #a8d0e6; /* pastel blue */
            position: relative;
        }

        /* Background photo overlay */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('fieldbg.jpg'); /* replace with your image */
            background-size: cover;
            background-position: center;
            opacity: 0.1; /* very low opacity */
            z-index: 0;
        }

        .container {
            position: relative;
            width: 360px; /* mobile-friendly */
            padding: 30px 25px;
            border-radius: 15px;
            background-color: #ffffff; /* white container */
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            z-index: 1;
        }

        h2, h3 {
            text-align: center;
            color: #333;
            margin-bottom: 15px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 8px;
            background-color: #29ce52;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #1d5752;
        }

        /* Admin message list cards */
        #messageList .card {
            background-color: #f0f4f8;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }

        #messageList .card strong {
            display: block;
            margin-bottom: 5px;
            color: #333;
        }

        #messageList .card p {
            margin: 2px 0;
            color: #555;
        }
    </style>
</head>

<body onload="checkAdmin()">

<div class="container">
    <h2>Admin Dashboard</h2>
    <h3>Student Messages</h3>
    <div id="messageList">
        <!-- JS will populate message cards -->
        <div class="card">
            <strong>Student Name</strong>
            <p>Message content...</p>
            <p>Status: Pending</p>
        </div>
    </div>

    <button onclick="logout()">Logout</button>
</div>

<script src="script.js"></script>
</body>
</html>
