<!DOCTYPE html>
<html>
<head>
    <title>Student Portal Login</title>
    <style>
        /* Reset default styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #a8d0e6; /* pastel blue */
            position: relative;
        }

        /* Background photo overlay on the body */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('fieldbg.jpg'); /* replace with your photo */
            background-size: cover;
            background-position: center;
            opacity: 0.1; /* very low opacity */
            z-index: 0;
        }

        .container {
            position: relative;
            width: 360px; /* mobile-friendly width */
            padding: 40px 30px;
            border-radius: 15px;
            background-color: #ffffff; /* white container */
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            z-index: 1; /* above the body background */
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin: 12px 0;
            border: none;
            border-radius: 8px;
            background-color: #29ce52;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #1d5752;
        }

        p {
            text-align: center;
            color: red;
            font-size: 14px;
            margin-top: 5px;
        }

        hr {
            margin: 20px 0;
            border: none;
            border-top: 1px solid #ccc;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p id="error"></p>

    <hr>

    <h2>Student Sign Up</h2>
    <input type="text" id="signupName" placeholder="Full Name">
    <input type="text" id="signupUsername" placeholder="Username">
    <input type="password" id="signupPassword" placeholder="Password">
    <button onclick="signup()">Sign Up</button>
    <p id="signupError"></p>
    <p id="signupSuccess"></p>
</div>

<script src="script.js"></script>
</body>
</html>
