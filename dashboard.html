<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Portal Home</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body onload="checkLogin(); loadStudentMessages();">

<!-- HEADER / NAVBAR -->
<header>
    <div class="logo">
        <img src="QP_TM.png" alt="School Logo">
    </div>
    <nav>
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#contents">Contents</a>
        <a href="dashboard.html">Message</a>
        <a href="#" onclick="logout(event)" class="logout-btn">Logout</a>
    </nav>
</header>

<div class="container">
    <h2>Send Message to Principal</h2>
    <textarea id="message" placeholder="Type your concern here..."></textarea>
    <button onclick="sendMessage()">Send Message</button>

    <h3>Your Messages</h3>
    <div id="studentMessages">
        <!-- JS will generate message cards here -->
        <div class="card">
            <strong>Your Name</strong>
            <p>Your Message</p>
            <p>Message Status</p>
        </div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
