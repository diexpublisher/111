<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Portal Home</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body onload="checkLogin(); loadStudentMessages();">

<!-- HEADER / NAVBAR -->
<header>
    <div class="logo">
        <img src="QP_TM.png" alt="School Logo">
    </div>
    <nav>
    <div class="nav-left">
        <a href="home.html"><img src="home.svg" alt="Home"></a>
        <a href="home.html"><img src="contents.svg" alt="Contents"></a>
        <a href="dashboard.html" class="message-btn">
            <img src="message.svg" alt="Message">&nbsp;&nbsp;
            <span>Message</span>
        </a>
    </div>

    <a href="#" onclick="logout(event)" class="logout-btn">
        <img src="logout.svg" alt="Logout">
    </a>&nbsp;&nbsp;
</nav>
</header>

<div class="container">
    <h2>Send Message to Principal</h2>
    <textarea id="message" placeholder="Type your concern here..."></textarea>
    <button onclick="sendMessage()">Send Message</button>

    <h3>Your Messages</h3>
    <div id="studentMessages">
        <!-- JS will generate message cards here -->
        <div class="card">
            <strong>Your Name</strong>
            <p>Your Message</p>
            <p>Message Status</p>
        </div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
